<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數據迷霧：多重生活考驗</title>
    <style>
        :root {
            --hologram-cyan: rgba(0, 255, 242, 0.6);
            --danger-red: #ff4d4d;
            --success-green: #00ff88;
        }

        body {
            margin: 0;
            height: 100vh;
            /* 優化手機背景圖：加入後備顏色，並限制圖片寬度為 800px 提升載入速度 */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        #0a1118 url('https://images.unsplash.com/photo-1513694203232-719a280e022f?q=80&w=800'); 
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            overflow: hidden;
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            padding: 15px; /* 防止手機邊緣貼死 */
            box-sizing: border-box;
        }

        /* 全息螢幕 - 修改為手機自適應 */
        #hologram-screen {
            width: 100%;
            max-width: 500px; /* 電腦上最大 500px，手機上自動變小 */
            min-height: 380px; /* 改為最小高度，讓內容能自適應撐開 */
            background: rgba(0, 40, 60, 0.25);
            border: 1px solid var(--hologram-cyan);
            border-radius: 20px;
            position: relative;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); /* 相容 iPhone Safari */
            box-shadow: 0 0 30px rgba(0, 255, 242, 0.2);
            transform: rotateX(3deg) rotateY(-5deg); /* 減小旋轉角度，手機看更清晰 */
            animation: idle-float 8s ease-in-out infinite;
            padding: 25px 20px;
            color: white;
            z-index: 5;
            box-sizing: border-box;
        }

        @keyframes idle-float {
            0%, 100% { transform: rotateX(3deg) rotateY(-5deg) translateY(0); }
            50% { transform: rotateX(5deg) rotateY(-3deg) translateY(-8px); }
        }

        /* 介面細節 */
        .status-bar { font-size: 10px; color: var(--hologram-cyan); margin-bottom: 20px; border-bottom: 1px solid rgba(0,255,242,0.2); padding-bottom: 5px; }
        .score-board { position: absolute; top: 15px; right: 20px; font-size: 12px; }

        /* 詐騙通知彈窗 - 修改手機寬度與位置 */
        #threat-notif {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 88%; /* 手機上滿滿的彈窗體驗 */
            max-width: 340px;
            background: rgba(15, 15, 20, 0.98);
            border: 1px solid var(--hologram-cyan);
            border-left: 6px solid var(--danger-red);
            padding: 20px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            box-shadow: 0 20px 50px rgba(0,0,0,1);
            box-sizing: border-box;
        }
        #threat-notif.active { transform: translate(-50%, -50%) scale(1); }

        .btn {
            background: transparent;
            border: 1px solid var(--hologram-cyan);
            color: white;
            padding: 14px 10px; /* 加大手指點擊區域 */
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px; /* 適合手機的字體大小 */
            border-radius: 8px;
            -webkit-tap-highlight-color: transparent; /* 拔除手機點擊藍色陰影 */
        }
        .btn:hover, .btn:active { background: var(--hologram-cyan); color: #000; }
        .btn-danger { border-color: var(--danger-red); color: var(--danger-red); }
        .btn-danger:hover, .btn-danger:active { background: var(--danger-red); color: white; }

        #feedback { font-size: 14px; margin-top: 15px; line-height: 1.6; display: none; }
    </style>
</head>
<body>

<div id="hologram-screen">
    <div class="status-bar">USER_PROFILE: RELAXED_MODE // ENCRYPTION: LOW</div>
    <div class="score-board">防禦得分: <span id="score">0</span></div>
    
    <div id="app-content">
        <h3 id="app-title">正在瀏覽：建模交流社群</h3>
        <p id="app-desc" style="font-size: 14px; opacity: 0.7;">
            [貼文] 沒想到 Blender 4.0 的布料模擬這麼簡單...<br><br>
            [留言] 求教學 +1<br>
            [廣告] 限時下載！高精度 PBR 材質包...
        </p>
    </div>

    <!-- 詐騙挑戰面板 -->
    <div id="threat-notif">
        <div id="threat-tag" style="color: var(--danger-red); font-weight: bold; font-size: 12px; margin-bottom: 5px;">NEW MESSAGE</div>
        <div id="threat-body" style="font-size: 14px; margin-bottom: 20px; line-height: 1.5;"></div>
        
        <div id="action-btns">
            <button class="btn" id="btn-1"></button>
            <button class="btn btn-danger" id="btn-2"></button>
        </div>

        <div id="feedback">
            <p id="feedback-text"></p>
            <button class="btn" onclick="nextQuestion()" style="border-color: var(--success-green); color: var(--success-green);">進入下一關</button>
        </div>
    </div>
</div>

<script>
    let score = 0;
    let currentIdx = 0;
    let questions = [];

    async function initGame() {
        try {
            const response = await fetch('question.json');
            if (!response.ok) {
                throw new Error(`HTTP 錯誤！狀態碼: ${response.status}`);
            }
            questions = await response.json();
            
            // 確保資料載入成功後，才開始跑第一題
            loadQuestion();
        } catch (error) {
            console.error("無法載入題目資料 (JSON):", error);
            document.getElementById('app-title').innerText = "連線錯誤";
            document.getElementById('app-desc').innerText = "無法載入防禦題目，請確認 json 檔案路徑或伺服器狀態。";
        }
    }

    function loadQuestion() {
        // 防止防禦機制在資料沒讀到時出錯
        if (questions.length === 0) return;

        const q = questions[currentIdx];
        document.getElementById('app-title').innerText = q.app;
        document.getElementById('threat-body').innerText = q.msg;
        document.getElementById('btn-1').innerText = q.choices[0].t;
        document.getElementById('btn-2').innerText = q.choices[1].t;
        
        // 綁定點擊事件
        document.getElementById('btn-1').onclick = () => checkAns(0);
        document.getElementById('btn-2').onclick = () => checkAns(1);

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('action-btns').style.display = 'block';
        
        setTimeout(() => {
            document.getElementById('threat-notif').classList.add('active');
        }, 1500);
    }

    function checkAns(choiceIdx) {
        const q = questions[currentIdx];
        const choice = q.choices[choiceIdx];
        
        document.getElementById('feedback-text').innerText = choice.msg;
        document.getElementById('feedback').style.display = 'block';
        document.getElementById('action-btns').style.display = 'none';

        if(choice.win) {
            score += 100;
            document.getElementById('score').innerText = score;
        }
    }

    function nextQuestion() {
        document.getElementById('threat-notif').classList.remove('active');
        currentIdx++;
        if(currentIdx < questions.length) {
            setTimeout(loadQuestion, 1000);
        } else {
            alert("🎉 挑戰完成！最終防禦得分：" + score);
            currentIdx = 0;
            score = 0;
            document.getElementById('score').innerText = 0;
            loadQuestion();
        }
    }

    initGame();
</script>

</body>
</html>
