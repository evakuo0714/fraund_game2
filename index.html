<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位防詐高手挑戰賽</title>
    <style>
        :root {
            --hologram-cyan: rgba(0, 255, 242, 0.6);
            --danger-red: #ff4d4d;
            --success-green: #00ff88;
        }

        body {
            margin: 0;
            height: 100vh;
            /* 優化手機背景圖：加入後備顏色，並限制圖片寬度為 800px 提升載入速度 */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        #0a1118 url('https://images.unsplash.com/photo-1513694203232-719a280e022f?q=80&w=800'); 
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            overflow: hidden;
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            padding: 15px; /* 防止手機邊緣貼死 */
            box-sizing: border-box;
        }

        /* 全息螢幕 - 修改為手機自適應 */
        #hologram-screen {
            width: 100%;
            max-width: 500px; /* 電腦上最大 500px，手機上自動變小 */
            min-height: 380px; /* 改為最小高度，讓內容能自適應撐開 */
            background: rgba(0, 40, 60, 0.25);
            border: 1px solid var(--hologram-cyan);
            border-radius: 20px;
            position: relative;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); /* 相容 iPhone Safari */
            box-shadow: 0 0 30px rgba(0, 255, 242, 0.2);
            transform: rotateX(3deg) rotateY(-5deg); /* 減小旋轉角度，手機看更清晰 */
            animation: idle-float 8s ease-in-out infinite;
            padding: 25px 20px;
            color: white;
            z-index: 5;
            box-sizing: border-box;
        }

        @keyframes idle-float {
            0%, 100% { transform: rotateX(3deg) rotateY(-5deg) translateY(0); }
            50% { transform: rotateX(5deg) rotateY(-3deg) translateY(-8px); }
        }

        /* 介面細節 */
        .status-bar { font-size: 10px; color: var(--hologram-cyan); margin-bottom: 20px; border-bottom: 1px solid rgba(0,255,242,0.2); padding-bottom: 5px; }
        .score-board { position: absolute; top: 15px; right: 20px; font-size: 12px; }

        /* 詐騙通知彈窗 - 修改手機寬度與位置 */
        #threat-notif {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 88%; /* 手機上滿滿的彈窗體驗 */
            max-width: 340px;
            background: rgba(15, 15, 20, 0.98);
            border: 1px solid var(--hologram-cyan);
            border-left: 6px solid var(--danger-red);
            padding: 20px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            box-shadow: 0 20px 50px rgba(0,0,0,1);
            box-sizing: border-box;
        }
        #threat-notif.active { transform: translate(-50%, -50%) scale(1); }

        .btn {
            background: transparent;
            border: 1px solid var(--hologram-cyan);
            color: white;
            padding: 14px 10px; /* 加大手指點擊區域 */
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px; /* 適合手機的字體大小 */
            border-radius: 8px;
            -webkit-tap-highlight-color: transparent; /* 拔除手機點擊藍色陰影 */
        }
        .btn:hover, .btn:active { background: var(--hologram-cyan); color: #000; }
        .btn-danger { border-color: var(--danger-red); color: var(--danger-red); }
        .btn-danger:hover, .btn-danger:active { background: var(--danger-red); color: white; }

        #feedback { font-size: 14px; margin-top: 15px; line-height: 1.6; display: none; }
    </style>
</head>
<body>

<div id="hologram-screen">
    <div class="status-bar">USER_PROFILE: RELAXED_MODE // ENCRYPTION: LOW</div>
    <div class="score-board">防禦得分: <span id="score">0</span></div>
    
    <div id="app-content">
        <h3 id="app-title">正在載入防禦系統...</h3>
        <p id="app-desc" style="font-size: 14px; opacity: 0.7;">
            請稍候，正在讀取最新的防詐騙核心資料庫...
        </p>
    </div>

    <div id="threat-notif">
        <div id="threat-tag" style="color: var(--danger-red); font-weight: bold; font-size: 12px; margin-bottom: 5px;">NEW MESSAGE</div>
        <div id="threat-body" style="font-size: 14px; margin-bottom: 20px; line-height: 1.5;"></div>
        
        <div id="action-btns">
            <button class="btn" id="btn-1"></button>
            <button class="btn btn-danger" id="btn-2"></button>
        </div>

        <div id="feedback">
            <p id="feedback-text"></p>
            <button class="btn" onclick="nextQuestion()" style="border-color: var(--success-green); color: var(--success-green);">進入下一關</button>
        </div>
    </div>
</div>

<script>
    let score = 0;
    let currentIdx = 0;
    let questions = [];

    // 初始化網頁，讀取外部分離的 JSON 資料
    async function initGame() {
        try {
            // 讀取與 HTML 放在同個資料夾底下的 question.json
            const response = await fetch('question.json');
            if (!response.ok) {
                throw new Error(`HTTP 錯誤！狀態碼: ${response.status}`);
            }
            const data = await response.json();
            
            // 解析你的新 JSON 結構：抓取物件裡面的 questions 陣列
            questions = data.questions;
            
            // 同步將網頁的標題換成你定義的標題
            if (data.quiz_title) {
                document.title = data.quiz_title;
            }
            
            // 資料載入成功後，開始跑第一題
            loadQuestion();
        } catch (error) {
            console.error("無法載入題目資料 (JSON):", error);
            document.getElementById('app-title').innerText = "連線錯誤";
            document.getElementById('app-desc').innerText = "無法載入防禦題目，請確認 json 檔案內容、檔名或 GitHub 部署狀態。";
        }
    }

    function loadQuestion() {
        if (questions.length === 0) return;

        const q = questions[currentIdx];
        
        // 頂部狀態欄顯示分類與進度（例如：【網購與物流】 第 1 / 30 題）
        document.getElementById('app-title').innerText = `【${q.category}】 第 ${currentIdx + 1} / ${questions.length} 題`;
        
        // 中央顯示題目情境
        document.getElementById('app-desc').innerText = "情境模擬中，請注意彈出的視窗訊息。";
        
        // 彈出視窗顯示詳細敘述
        document.getElementById('threat-body').innerText = q.question;
        
        // 帶入你的 options 選項文字
        document.getElementById('btn-1').innerText = q.options[0];
        document.getElementById('btn-2').innerText = q.options[1];
        
        // 重新綁定點擊事件（選項一對應索引 0，選項二對應索引 1）
        document.getElementById('btn-1').onclick = () => checkAns(0);
        document.getElementById('btn-2').onclick = () => checkAns(1);

        // 重置元件狀態
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('action-btns').style.display = 'block';
        
        // 動態滑入彈窗
        setTimeout(() => {
            document.getElementById('threat-notif').classList.add('active');
        }, 800);
    }
