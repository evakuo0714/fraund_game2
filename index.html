<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位防詐高手挑戰賽</title>
    <style>
        :root {
            --hologram-cyan: rgba(0, 255, 242, 0.6);
            --danger-red: #ff4d4d;
            --success-green: #00ff88;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        #0a1118 url('https://images.unsplash.com/photo-1513694203232-719a280e022f?q=80&w=800'); 
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            overflow: hidden;
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            padding: 15px;
            box-sizing: border-box;
        }

        #hologram-screen {
            width: 100%;
            max-width: 500px;
            min-height: 380px;
            background: rgba(0, 40, 60, 0.25);
            border: 1px solid var(--hologram-cyan);
            border-radius: 20px;
            position: relative;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 0 30px rgba(0, 255, 242, 0.2);
            transform: rotateX(3deg) rotateY(-5deg);
            animation: idle-float 8s ease-in-out infinite;
            padding: 25px 20px;
            color: white;
            z-index: 5;
            box-sizing: border-box;
        }

        @keyframes idle-float {
            0%, 100% { transform: rotateX(3deg) rotateY(-5deg) translateY(0); }
            50% { transform: rotateX(5deg) rotateY(-3deg) translateY(-8px); }
        }

        .status-bar { font-size: 10px; color: var(--hologram-cyan); margin-bottom: 20px; border-bottom: 1px solid rgba(0,255,242,0.2); padding-bottom: 5px; }
        .score-board { position: absolute; top: 15px; right: 20px; font-size: 12px; }

        #threat-notif {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 88%;
            max-width: 340px;
            background: rgba(15, 15, 20, 0.98);
            border: 1px solid var(--hologram-cyan);
            border-left: 6px solid var(--danger-red);
            padding: 20px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            box-shadow: 0 20px 50px rgba(0,0,0,1);
            box-sizing: border-box;
        }
        #threat-notif.active { transform: translate(-50%, -50%) scale(1); }

        .btn {
            background: transparent;
            border: 1px solid var(--hologram-cyan);
            color: white;
            padding: 14px 10px;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
            border-radius: 8px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover, .btn:active { background: var(--hologram-cyan); color: #000; }
        .btn-danger { border-color: var(--danger-red); color: var(--danger-red); }
        .btn-danger:hover, .btn-danger:active { background: var(--danger-red); color: white; }

        #feedback { font-size: 14px; margin-top: 15px; line-height: 1.6; display: none; }
    </style>
</head>
<body>

<div id="hologram-screen">
    <div class="status-bar">USER_PROFILE: SECURITY_MODE // ENCRYPTION: HIGH</div>
    <div class="score-board">防禦得分: <span id="score">0</span></div>
    
    <div id="app-content">
        <h3 id="app-title">數位防詐高手挑戰賽</h3>
        <p id="app-desc" style="font-size: 14px; opacity: 0.7;">
            情境模擬中，請注意彈出的視窗訊息。
        </p>
    </div>

    <div id="threat-notif">
        <div id="threat-tag" style="color: var(--danger-red); font-weight: bold; font-size: 12px; margin-bottom: 5px;">NEW MESSAGE</div>
        <div id="threat-body" style="font-size: 14px; margin-bottom: 20px; line-height: 1.5;"></div>
        
        <div id="action-btns">
            <button class="btn" id="btn-1"></button>
            <button class="btn btn-danger" id="btn-2"></button>
        </div>

        <div id="feedback">
            <p id="feedback-text"></p>
            <button class="btn" onclick="nextQuestion()" style="border-color: var(--success-green); color: var(--success-green);">進入下一關</button>
        </div>
    </div>
</div>
